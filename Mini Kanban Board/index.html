<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Kanban Task Manager</title>

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Enable class-based dark mode
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <!-- Small extra CSS for simple animations -->
    <style>
      .fade-in {
        animation: fadeIn 0.25s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body
    class="bg-slate-100 dark:bg-slate-900 min-h-screen flex items-center justify-center transition-colors duration-300"
  >
    <div class="w-full max-w-5xl mx-auto p-4 space-y-6">
      <!-- Header Section -->
      <header
        class="bg-gradient-to-r from-indigo-500 via-sky-500 to-cyan-500 rounded-2xl shadow-lg px-6 py-5 text-white flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
      >
        <div class="text-center sm:text-left">
          <h1 class="text-3xl font-bold tracking-tight">
            Mini Kanban Task Manager
          </h1>
          <p class="mt-1 text-sm sm:text-base text-indigo-100">
            Organize your tasks efficiently and stay focused.
          </p>
        </div>

        <!-- Dark mode toggle -->
        <button
          id="theme-toggle"
          class="mt-2 sm:mt-0 inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/15 text-sm font-medium shadow hover:bg-white/25 transition"
        >
          <span id="theme-toggle-icon" class="inline-flex items-center"></span>
          <span id="theme-toggle-text">Dark mode</span>
        </button>
      </header>

      <!-- Task input area -->
      <section
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-200 dark:border-slate-700 px-4 py-4 sm:px-6"
      >
        <div class="flex flex-col gap-3">
          <!-- Title input + add button (original behavior kept) -->
          <div class="flex flex-col sm:flex-row gap-3 items-stretch">
            <div class="relative flex-1">
              <span
                class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400 dark:text-slate-500"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 12h6m-6 4h6m-5-8h4M5 7h14a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"
                  />
                </svg>
              </span>
              <input
                id="task-input"
                type="text"
                placeholder="Add a new task..."
                class="w-full pl-9 pr-3 py-2.5 rounded-full border border-slate-300 dark:border-slate-600 shadow-sm text-sm sm:text-base text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400 bg-white dark:bg-slate-900/60"
              />
            </div>

            <button
              id="add-task-btn"
              class="inline-flex items-center justify-center gap-1 px-4 py-2.5 rounded-full bg-sky-600 text-white text-sm sm:text-base font-medium shadow-md hover:bg-sky-700 active:bg-sky-800 transition"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              <span>Add Task</span>
            </button>
          </div>

          <!-- Bonus fields: priority + due date -->
          <div class="flex flex-col sm:flex-row gap-3">
            <div class="flex-1">
              <label
                for="priority-select"
                class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1"
                >Priority</label
              >
              <select
                id="priority-select"
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900/60 text-sm text-slate-800 dark:text-slate-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400"
              >
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>

            <div class="flex-1">
              <label
                for="due-date-input"
                class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1"
                >Due date (optional)</label
              >
              <input
                id="due-date-input"
                type="date"
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900/60 text-sm text-slate-800 dark:text-slate-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-sky-400"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Kanban Board -->
      <main
        class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-4 sm:p-6 border border-slate-200 dark:border-slate-700 transition-colors duration-300"
      >
        <div class="flex flex-col md:flex-row gap-4">
          <!-- Todo Column -->
          <section
            class="flex-1 bg-slate-50 dark:bg-slate-900/60 rounded-xl border border-slate-200 dark:border-slate-700 p-3 flex flex-col transition-colors duration-300"
          >
            <div
              class="flex items-center justify-between mb-3 px-3 py-2 rounded-lg bg-sky-100 dark:bg-sky-900/50 text-sky-800 dark:text-sky-200"
            >
              <div class="flex items-center gap-2">
                <span
                  class="inline-flex h-2 w-2 rounded-full bg-sky-500 animate-pulse"
                ></span>
                <h2 class="text-sm sm:text-base font-semibold">Todo</h2>
              </div>
              <span
                id="todo-count"
                class="text-xs sm:text-sm font-medium bg-white/70 dark:bg-slate-900/60 px-2 py-0.5 rounded-full"
                >(0)</span
              >
            </div>
            <div
              id="todo-column"
              data-column="todo"
              class="flex-1 min-h-[120px] space-y-3 pb-1 rounded-md transition-colors duration-200"
            ></div>
          </section>

          <!-- Doing Column -->
          <section
            class="flex-1 bg-slate-50 dark:bg-slate-900/60 rounded-xl border border-slate-200 dark:border-slate-700 p-3 flex flex-col transition-colors duration-300"
          >
            <div
              class="flex items-center justify-between mb-3 px-3 py-2 rounded-lg bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-100"
            >
              <div class="flex items-center gap-2">
                <span
                  class="inline-flex h-2 w-2 rounded-full bg-amber-500 animate-pulse"
                ></span>
                <h2 class="text-sm sm:text-base font-semibold">Doing</h2>
              </div>
              <span
                id="doing-count"
                class="text-xs sm:text-sm font-medium bg-white/70 dark:bg-slate-900/60 px-2 py-0.5 rounded-full"
                >(0)</span
              >
            </div>
            <div
              id="doing-column"
              data-column="doing"
              class="flex-1 min-h-[120px] space-y-3 pb-1 rounded-md transition-colors duration-200"
            ></div>
          </section>

          <!-- Done Column -->
          <section
            class="flex-1 bg-slate-50 dark:bg-slate-900/60 rounded-xl border border-slate-200 dark:border-slate-700 p-3 flex flex-col transition-colors duration-300"
          >
            <div
              class="flex items-center justify-between mb-3 px-3 py-2 rounded-lg bg-emerald-100 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-100"
            >
              <div class="flex items-center gap-2">
                <span
                  class="inline-flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"
                ></span>
                <h2 class="text-sm sm:text-base font-semibold">Done</h2>
              </div>
              <span
                id="done-count"
                class="text-xs sm:text-sm font-medium bg-white/70 dark:bg-slate-900/60 px-2 py-0.5 rounded-full"
                >(0)</span
              >
            </div>
            <div
              id="done-column"
              data-column="done"
              class="flex-1 min-h-[120px] space-y-3 pb-1 rounded-md transition-colors duration-200"
            ></div>
          </section>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
